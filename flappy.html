<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird | Skyler's Arcade</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f0f1b; color: white; padding: 20px; touch-action: none; overflow: hidden; }
        .home-btn { background: #e94560; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        canvas { background: #70c5ce; border: 4px solid #4ecca3; border-radius: 10px; width: 100%; max-width: 320px; height: 480px; display: block; margin: 0 auto; }
        .score-text { font-size: 1.5rem; color: #f1c40f; font-weight: bold; margin: 10px 0; }
        .btn-start { padding: 15px 30px; font-size: 1.2rem; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="home-btn">🏠 Home</a>
    <h2>Flappy Bird</h2>
    <canvas id="canvas" width="320" height="480"></canvas>
    <div class="score-text">Score: <span id="score">0</span></div>
    <button onclick="start()" id="start-btn" class="btn-start">Start Game</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let bird = { x: 50, y: 200, w: 34, h: 24, velocity: 0, gravity: 0.6, jump: -8 };
        let pipes = [];
        let score = 0;
        let active = false;
        let frameCount = 0;

        const birdImg = new Image();
        birdImg.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 24"><circle fill="%23f1c40f" cx="15" cy="12" r="12"/><circle fill="white" cx="22" cy="8" r="4"/><circle fill="black" cx="24" cy="8" r="1.5"/></svg>';

        function start() {
            bird.y = 200; bird.velocity = 0; pipes = []; score = 0; active = true; frameCount = 0;
            document.getElementById('start-btn').style.display = 'none';
            loop();
        }

        function loop() {
            if (!active) return;
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            ctx.fillStyle = "#70c5ce"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(birdImg, bird.x, bird.y, bird.w, bird.h);

            if (frameCount % 100 === 0) {
                let gap = 130;
                let topH = Math.floor(Math.random() * (canvas.height - gap - 100)) + 50;
                pipes.push({ x: canvas.width, topH, bottomH: canvas.height - topH - gap });
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                let p = pipes[i]; p.x -= 3;
                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(p.x, 0, 52, p.topH);
                ctx.fillRect(p.x, canvas.height - p.bottomH, 52, p.bottomH);

                if (bird.x + bird.w > p.x && bird.x < p.x + 52) {
                    if (bird.y < p.topH || bird.y + bird.h > canvas.height - p.bottomH) active = false;
                }
                if (p.x === 48) { score++; document.getElementById('score').innerText = score; }
                if (p.x < -60) pipes.splice(i, 1);
            }

            if (bird.y > canvas.height || bird.y < -50) active = false;
            if (!active) document.getElementById('start-btn').style.display = 'inline-block';

            frameCount++;
            requestAnimationFrame(loop);
        }

        const flap = (e) => { if (e) e.preventDefault(); if (active) bird.velocity = bird.jump; };
        window.addEventListener('keydown', (e) => { if (e.code === "Space") flap(e); });
        canvas.addEventListener('touchstart', flap);
    </script>
</body>
</html>

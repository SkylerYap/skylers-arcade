<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird | Skyler's Arcade</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f0f1b; color: white; padding: 20px; touch-action: none; overflow: hidden; }
        .home-btn { background: #e94560; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        canvas { background: #70c5ce; border: 4px solid #4ecca3; border-radius: 10px; width: 100%; max-width: 320px; height: 480px; touch-action: none; }
        .score-text { font-size: 1.5rem; color: #f1c40f; font-weight: bold; margin: 10px 0; }
        .btn-start { padding: 15px 30px; font-size: 1.2rem; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="home-btn">🏠 Home</a>
    <h2>Flappy Bird</h2>
    
    <canvas id="canvas" width="320" height="480"></canvas>
    <div class="score-text">Score: <span id="score">0</span></div>
    
    <button onclick="start()" id="start-btn" class="btn-start">Start Flapping</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let bird = { x: 50, y: 150, w: 30, h: 24, velocity: 0, gravity: 0.5, jump: -8 };
        let pipes = [];
        let score = 0;
        let active = false;
        let frameCount = 0;

        function start() {
            bird.y = 150; bird.velocity = 0; pipes = []; score = 0; active = true; frameCount = 0;
            document.getElementById('start-btn').style.display = 'none';
            loop();
        }

        function loop() {
            if (!active) return;

            // Physics
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Background & Ground
            ctx.fillStyle = "#70c5ce"; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Bird
            ctx.fillStyle = "#f1c40f"; ctx.fillRect(bird.x, bird.y, bird.w, bird.h);

            // Pipes
            if (frameCount % 90 === 0) {
                let gap = 120;
                let minPipeHeight = 50;
                let pipeHeight = Math.floor(Math.random() * (canvas.height - gap - 100)) + minPipeHeight;
                pipes.push({ x: canvas.width, top: pipeHeight, bottom: canvas.height - pipeHeight - gap });
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                let p = pipes[i];
                p.x -= 3;

                // Draw Pipes
                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(p.x, 0, 50, p.top); // Top pipe
                ctx.fillRect(p.x, canvas.height - p.bottom, 50, p.bottom); // Bottom pipe

                // Collision
                if (bird.x + bird.w > p.x && bird.x < p.x + 50) {
                    if (bird.y < p.top || bird.y + bird.h > canvas.height - p.bottom) {
                        gameOver();
                    }
                }

                // Scoring
                if (p.x === bird.x) {
                    score++;
                    document.getElementById('score').innerText = score;
                }

                if (p.x + 50 < 0) pipes.splice(i, 1);
            }

            // Ceiling/Floor collision
            if (bird.y + bird.h > canvas.height || bird.y < 0) gameOver();

            frameCount++;
            requestAnimationFrame(loop);
        }

        function gameOver() {
            active = false;
            document.getElementById('start-btn').style.display = 'inline-block';
            document.getElementById('start-btn').innerText = 'Try Again';
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white"; ctx.font = "bold 30px Arial"; ctx.fillText("GAME OVER", 70, 240);
        }

        const flap = (e) => {
            if (e) e.preventDefault();
            if (active) bird.velocity = bird.jump;
        };

        window.addEventListener('keydown', (e) => { if (e.code === "Space") flap(e); });
        canvas.addEventListener('touchstart', flap);
    </script>
</body>
</html>

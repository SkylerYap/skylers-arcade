<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Run | Skyler's Arcade</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f0f1b; color: white; padding: 20px; touch-action: none; overflow: hidden; }
        .home-btn { background: #e94560; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        canvas { background: #16213e; border-bottom: 4px solid #4ecca3; border-radius: 10px; width: 100%; max-width: 400px; height: auto; display: block; margin: 0 auto; }
        .score-text { font-size: 1.5rem; color: #f1c40f; font-weight: bold; margin: 10px 0; }
        .btn-start { padding: 15px 30px; font-size: 1.2rem; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <a href="index.html" class="home-btn">🏠 Home</a>
    <h2>Dino Run</h2>
    <canvas id="canvas" width="400" height="200"></canvas>
    <div class="score-text">Score: <span id="score">0</span></div>
    <button onclick="start()" id="start-btn" class="btn-start">Start Game</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let dino = { x: 50, y: 150, w: 35, h: 35, dy: 0, jumpForce: 13, grounded: true };
        let obstacles = [];
        let active = false;
        let score = 0;
        let gameSpeed = 200;
        let lastTime = 0;
        let spawnTimer = 0;

        const dinoImg = new Image();
        dinoImg.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30"><path fill="%234ecca3" d="M18 3h5v3h4v2h1v4h-4v1h1c0 2 0 4-1 6s-1 4-2 10h-5v-1h1c0-2-1-4-1-6s0-2-1-5c0-2-1-4-1-6v-2h-5v2h-2v2h-3v2h-4v4h-4v2h7v4h-3v4h7v-4h-3v-4h7v4h3v4h3v-4h-3v-4h3v-4h1c0-2 1-4 1-6s1-4 1-6v-2h-5zM21 6h2v2h-2z"/></svg>';

        const cactusImg = new Image();
        cactusImg.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 35"><path fill="%23e94560" d="M7 0h6v35H7zM0 10h7v5H0zM13 5h7v5h-7z"/></svg>';

        function start() {
            active = true;
            score = 0;
            obstacles = [];
            gameSpeed = 200;
            dino.y = 150;
            dino.dy = 0;
            spawnTimer = 0;
            lastTime = performance.now(); // Reset time to fix NaN
            document.getElementById('start-btn').style.display = 'none';
            requestAnimationFrame(loop);
        }

        function loop(t) {
            if (!active) return;
            let dt = (t - lastTime) / 1000;
            if (isNaN(dt)) dt = 0.016; 
            lastTime = t;

            ctx.clearRect(0, 0, 400, 200);
            ctx.strokeStyle = "#4ecca3";
            ctx.beginPath(); ctx.moveTo(0, 185); ctx.lineTo(400, 185); ctx.stroke();

            dino.dy += 35 * dt;
            dino.y += dino.dy;
            if (dino.y > 150) { dino.y = 150; dino.dy = 0; dino.grounded = true; }

            ctx.drawImage(dinoImg, dino.x, dino.y, dino.w, dino.h);

            spawnTimer -= dt;
            if (spawnTimer <= 0) {
                obstacles.push({ x: 420 });
                spawnTimer = 1.5 + Math.random();
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= gameSpeed * dt;
                ctx.drawImage(cactusImg, o.x, 150, 20, 35);
                if (dino.x < o.x + 15 && dino.x + 25 > o.x && dino.y + 25 > 150) {
                    active = false;
                    document.getElementById('start-btn').style.display = 'inline-block';
                }
                if (o.x < -50) obstacles.splice(i, 1);
            }

            score += 10 * dt;
            document.getElementById('score').innerText = Math.floor(score);
            requestAnimationFrame(loop);
        }

        window.addEventListener('keydown', (e) => { if (e.code === "Space" && dino.grounded) { dino.dy = -12; dino.grounded = false; } });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); if (dino.grounded) { dino.dy = -12; dino.grounded = false; } });
    </script>
</body>
</html>

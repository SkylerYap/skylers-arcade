<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Run | Skyler's Arcade</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f0f1b; color: white; padding: 20px; touch-action: none; }
        .home-btn { background: #e94560; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        canvas { background: #16213e; border-bottom: 4px solid #4ecca3; border-radius: 10px; width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <a href="index.html" class="home-btn">🏠 Home</a>
    <h2>Dino Run</h2>
    <canvas id="canvas" width="400" height="200"></canvas>
    <div id="score">Score: 0</div>
    <button onclick="start()" id="start-btn" style="padding:15px; margin-top:10px; border-radius:10px; cursor:pointer;">Start Game</button>

    <script>
        const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
        let dino = {y:150, dy:0, grounded:true}; let obstacles = []; let active = false; let score = 0; let lastTime = 0;

        function start() { active = true; score = 0; obstacles = []; dino.y = 150; document.getElementById('start-btn').style.display='none'; lastTime = performance.now(); requestAnimationFrame(loop); }

        function loop(t) {
            if(!active) return;
            let dt = (t - lastTime)/1000; lastTime = t;
            ctx.clearRect(0,0,400,200);
            dino.dy += 40 * dt; dino.y += dino.dy;
            if(dino.y > 150) { dino.y = 150; dino.dy = 0; dino.grounded = true; }
            ctx.fillStyle = "#4ecca3"; ctx.fillRect(50, dino.y, 30, 30);
            
            if(Math.random() < 0.02) obstacles.push({x:400});
            obstacles.forEach((o, i) => {
                o.x -= 250 * dt; ctx.fillStyle = "#e94560"; ctx.fillRect(o.x, 150, 20, 30);
                if(o.x < 80 && o.x > 50 && dino.y > 120) { active = false; alert("Game Over!"); document.getElementById('start-btn').style.display='inline'; }
            });
            obstacles = obstacles.filter(o => o.x > -20);
            score += 10 * dt; document.getElementById('score').innerText = "Score: " + Math.floor(score);
            requestAnimationFrame(loop);
        }
        window.addEventListener('keydown', (e) => { if(e.code==="Space" && dino.grounded) { dino.dy = -12; dino.grounded = false; } });
        canvas.addEventListener('touchstart', () => { if(dino.grounded) { dino.dy = -12; dino.grounded = false; } });
    </script>
</body>
</html>

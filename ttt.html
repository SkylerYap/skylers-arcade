<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe | Skyler's Arcade</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f0f1b; color: white; padding: 20px; }
        .home-btn { background: #e94560; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; justify-content: center; margin: 20px; }
        .cell { width: 100px; height: 100px; background: #16213e; border: 2px solid #4ecca3; border-radius: 15px; font-size: 3rem; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .win { background: #4ecca3 !important; color: #1a1a2e; }
    </style>
</head>
<body>
    <a href="index.html" class="home-btn">🏠 Home</a>
    <h2>Tic Tac Toe</h2>
    <div id="board" class="grid"></div>
    <p id="msg">Your Turn (X)</p>
    <button onclick="location.reload()" style="padding: 10px; cursor: pointer;">Reset Game</button>

    <script>
        let b = Array(9).fill(""); let active = true;
        const board = document.getElementById('board');
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        for(let i=0; i<9; i++) {
            let c = document.createElement('div'); c.className = 'cell'; c.id = i;
            c.onclick = () => {
                if(b[i]==="" && active) {
                    b[i]="X"; c.innerText="X"; 
                    if(!check()) { active=false; setTimeout(cpu, 500); }
                }
            };
            board.appendChild(c);
        }

        function cpu() {
            let e = b.map((v,i)=>v===""?i:null).filter(v=>v!==null);
            if(e.length>0) {
                let m = e[Math.floor(Math.random()*e.length)];
                b[m]="O"; document.getElementById(m).innerText="O";
                if(!check()) active=true;
            }
        }

        function check() {
            for(let s of wins) {
                if(b[s[0]] && b[s[0]]===b[s[1]] && b[s[0]]===b[s[2]]) {
                    document.getElementById('msg').innerText = b[s[0]] + " Wins!";
                    s.forEach(idx => document.getElementById(idx).classList.add('win'));
                    active=false; return true;
                }
            }
            if(!b.includes("")) { document.getElementById('msg').innerText="Draw!"; return true; }
            return false;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe | Skyler's Arcade</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f0f1b; color: white; padding: 20px; }
        .home-btn { background: #e94560; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; display: inline-block; margin-bottom: 20px; transition: 0.3s; }
        .home-btn:hover { background: #ff5e78; transform: scale(1.05); }

        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; justify-content: center; margin: 20px auto; }
        .cell { width: 100px; height: 100px; background: #16213e; border: 2px solid #4ecca3; border-radius: 15px; font-size: 3rem; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .cell:hover { background: #1b2a4e; }
        .win { background: #4ecca3 !important; color: #1a1a2e !important; box-shadow: 0 0 20px #4ecca3; }
        
        #msg { font-size: 1.2rem; font-weight: bold; color: #4ecca3; margin: 15px 0; min-height: 1.5em; }
        .reset-btn { padding: 12px 25px; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <a href="index.html" class="home-btn">🏠 Home</a>
    <h2>Tic Tac Toe</h2>
    
    <div id="msg">Your Turn (X)</div>
    <div id="board" class="grid"></div>
    
    <button class="reset-btn" onclick="resetGame()">Reset Game</button>

    <script>
        let boardArr = Array(9).fill("");
        let gameActive = true;
        const winCombos = [
            [0,1,2], [3,4,5], [6,7,8], // Rows
            [0,3,6], [1,4,7], [2,5,8], // Cols
            [0,4,8], [2,4,6]           // Diagonals
        ];

        const boardElement = document.getElementById('board');
        const msgElement = document.getElementById('msg');

        function createBoard() {
            boardElement.innerHTML = '';
            for(let i = 0; i < 9; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = 'c' + i;
                cell.onclick = () => handleMove(i);
                boardElement.appendChild(cell);
            }
        }

        function handleMove(i) {
            if(boardArr[i] !== "" || !gameActive) return;

            // Player Move
            boardArr[i] = "X";
            document.getElementById('c' + i).innerText = "X";

            if(checkWin("X")) {
                endGame("X Wins! 🏆");
            } else if(boardArr.every(cell => cell !== "")) {
                endGame("It's a Draw! 🤝");
            } else {
                gameActive = false; // Block player while CPU "thinks"
                msgElement.innerText = "CPU is thinking...";
                setTimeout(cpuMove, 600);
            }
        }

        function cpuMove() {
            if(!gameActive && boardArr.includes("")) {
                // Simple AI: Try to find an empty spot
                let emptyCells = boardArr.map((v, i) => v === "" ? i : null).filter(v => v !== null);
                let randomMove = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                
                boardArr[randomMove] = "O";
                document.getElementById('c' + randomMove).innerText = "O";

                if(checkWin("O")) {
                    endGame("CPU Wins! 🤖");
                } else if(boardArr.every(cell => cell !== "")) {
                    endGame("It's a Draw! 🤝");
                } else {
                    gameActive = true;
                    msgElement.innerText = "Your Turn (X)";
                }
            }
        }

        function checkWin(player) {
            for(let combo of winCombos) {
                if(combo.every(index => boardArr[index] === player)) {
                    combo.forEach(index => {
                        document.getElementById('c' + index).classList.add('win');
                    });
                    return true;
                }
            }
            return false;
        }

        function endGame(message) {
            msgElement.innerText = message;
            gameActive = false;
        }

        function resetGame() {
            boardArr = Array(9).fill("");
            gameActive = true;
            msgElement.innerText = "Your Turn (X)";
            createBoard();
        }

        // Start the game
        createBoard();
    </script>
</body>
</html>

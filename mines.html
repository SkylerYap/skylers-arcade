<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper | Skyler's Arcade</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f0f1b; color: white; padding: 20px; }
        .home-btn { background: #e94560; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(10, 32px); gap: 4px; justify-content: center; background: #16213e; padding: 10px; border-radius: 10px; width: fit-content; margin: 0 auto; }
        .cell { width: 32px; height: 32px; background: #1a1a2e; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .rev { background: #4ecca3 !important; color: #1a1a2e; }
        #menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #16213e; padding: 20px; border: 3px solid #4ecca3; border-radius: 15px; z-index: 10; }
        .menu-btn { display: block; width: 120px; margin: 10px; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <a href="index.html" class="home-btn">🏠 Home</a>
    <h2>Minesweeper</h2>
    <div id="menu">
        <button id="rev-btn" class="menu-btn" style="background:#4ecca3" onclick="doRev()">Reveal</button>
        <button class="menu-btn" style="background:#f1c40f" onclick="doFlag()">Flag</button>
        <button class="menu-btn" style="background:#555;color:white" onclick="closeM()">Cancel</button>
    </div>
    <div id="board" class="grid"></div>
    <button onclick="location.reload()" style="margin-top:20px; padding:10px; cursor:pointer;">New Game</button>

    <script>
        let mB = Array(100).fill(false); let mS = Array(100).fill(0); let act = null;
        const board = document.getElementById('board');
        for(let i=0; i<15; i++) { let r=Math.floor(Math.random()*100); mB[r]=true; }
        for(let i=0; i<100; i++) {
            let c = document.createElement('div'); c.className = 'cell'; c.id = 'c'+i;
            c.onclick = () => { act=i; document.getElementById('rev-btn').style.display = mS[i]===1?'none':'block'; document.getElementById('menu').style.display='block'; };
            board.appendChild(c);
        }
        function closeM(){ document.getElementById('menu').style.display='none'; }
        function doFlag(){ mS[act]=1; document.getElementById('c'+act).innerText='🚩'; closeM(); }
        function doRev(){
            closeM(); if(mB[act]){ document.getElementById('c'+act).innerText='💣'; alert('BOOM!'); location.reload(); }
            else { document.getElementById('c'+act).classList.add('rev'); mS[act]=2; }
        }
    </script>
</body>
</html>

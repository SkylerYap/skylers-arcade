<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS | Skyler's Arcade</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f0f1b; color: white; padding: 20px; }
        .home-btn { background: #e94560; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .slot { font-size: 3rem; background: #16213e; padding: 20px; border-radius: 15px; border: 2px solid #4ecca3; display: inline-block; margin: 10px; min-width: 80px; }
        .btn-move { font-size: 2.5rem; cursor: pointer; border: none; background: white; border-radius: 50%; width: 80px; height: 80px; margin: 10px; transition: 0.2s; }
        .btn-move:hover { transform: scale(1.1); background: #4ecca3; }
    </style>
</head>
<body>
    <a href="index.html" class="home-btn">🏠 Home</a>
    <h2>Rock Paper Scissors</h2>
    <div id="score">Player: 0 | CPU: 0</div>
    <div>
        <div class="slot" id="p-slot">❓</div>
        <div class="slot" id="c-slot">❓</div>
    </div>
    <p id="msg">Choose your move!</p>
    <button class="btn-move" onclick="play('rock', '✊')">✊</button>
    <button class="btn-move" onclick="play('paper', '✋')">✋</button>
    <button class="btn-move" onclick="play('scissors', '✌️')">✌️</button>

    <script>
        let pScore = 0, cScore = 0;
        function play(u, e) {
            const opts = ['rock', 'paper', 'scissors'];
            const ems = {rock:'✊', paper:'✋', scissors:'✌️'};
            const cpu = opts[Math.floor(Math.random()*3)];
            document.getElementById('p-slot').innerText = e;
            document.getElementById('c-slot').innerText = ems[cpu];
            if(u===cpu) msg="Tie!";
            else if((u==='rock'&&cpu==='scissors')||(u==='paper'&&cpu==='rock')||(u==='scissors'&&cpu==='paper')) { msg="Win!"; pScore++; }
            else { msg="Loss!"; cScore++; }
            document.getElementById('msg').innerText = msg;
            document.getElementById('score').innerText = `Player: ${pScore} | CPU: ${cScore}`;
        }
    </script>
</body>
</html>
